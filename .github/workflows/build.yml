name: Build Windows Binary

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C target-feature=+crt-static"

jobs:
  build-windows:
    name: Build for Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action/stable@master
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ima-cli-windows-x64
          path: target/x86_64-pc-windows-msvc/release/ima.exe
          if-no-files-found: error

      - name: Create release archive
        run: |
          cd target/x86_64-pc-windows-msvc/release
          Compress-Archive -Path ima.exe -DestinationPath ../../../ima-cli-windows-x64.zip -Force
        shell: pwsh

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ima-cli-windows-x64-archive
          path: ima-cli-windows-x64.zip
          if-no-files-found: error

  build-cross:
    name: Build for multiple platforms
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: ima-cli-linux-x64
          - target: x86_64-apple-darwin
            artifact_name: ima-cli-macos-x64
          - target: aarch64-apple-darwin
            artifact_name: ima-cli-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action/stable@master
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/ima
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-cross]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          cd artifacts
          ls -la
          # Rename binaries appropriately
          mv ima-cli-windows-x64/ima.exe ima-cli-windows-x64.exe || true
          mv ima-cli-linux-x64/ima ima-cli-linux-x64 || true
          mv ima-cli-macos-x64/ima ima-cli-macos-x64 || true
          mv ima-cli-macos-arm64/ima ima-cli-macos-arm64 || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ima-cli-windows-x64/ima.exe
            artifacts/ima-cli-linux-x64/ima
            artifacts/ima-cli-macos-x64/ima
            artifacts/ima-cli-macos-arm64/ima
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
