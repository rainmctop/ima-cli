name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C target-feature=+crt-static"

jobs:
  build-windows:
    name: Build for Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ima-cli-windows-x64
          path: target/x86_64-pc-windows-msvc/release/ima-cli.exe
          if-no-files-found: error

      - name: Create release archive
        run: |
          cd target/x86_64-pc-windows-msvc/release
          Compress-Archive -Path ima-cli.exe -DestinationPath ../../../ima-cli-windows-x64.zip -Force
        shell: pwsh

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ima-cli-windows-x64-archive
          path: ima-cli-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build for Linux x64
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ima-cli-linux-x64
          path: target/x86_64-unknown-linux-gnu/release/ima-cli
          if-no-files-found: error

      - name: Create release archive
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar -czvf ../../../ima-cli-linux-x64.tar.gz ima-cli
        shell: bash

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ima-cli-linux-x64-archive
          path: ima-cli-linux-x64.tar.gz
          if-no-files-found: error

  build-macos-x64:
    name: Build for macOS x64
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-apple-darwin

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ima-cli-macos-x64
          path: target/x86_64-apple-darwin/release/ima-cli
          if-no-files-found: error

      - name: Create release archive
        run: |
          cd target/x86_64-apple-darwin/release
          tar -czvf ../../../ima-cli-macos-x64.tar.gz ima-cli
        shell: bash

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ima-cli-macos-x64-archive
          path: ima-cli-macos-x64.tar.gz
          if-no-files-found: error

  build-macos-arm64:
    name: Build for macOS ARM64
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-arm64-cargo-

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ima-cli-macos-arm64
          path: target/aarch64-apple-darwin/release/ima-cli
          if-no-files-found: error

      - name: Create release archive
        run: |
          cd target/aarch64-apple-darwin/release
          tar -czvf ../../../ima-cli-macos-arm64.tar.gz ima-cli
        shell: bash

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ima-cli-macos-arm64-archive
          path: ima-cli-macos-arm64.tar.gz
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*-archive"
          merge-multiple: true

      - name: List release assets
        run: |
          cd artifacts
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
